<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo管理＿Ver.1.1</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">

<!--画面描写（デザイン） -->
<style>


h2{
    margin-top:25px;
}

.header{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

input[type="date"]{
    font-size:16px;
}

#todoInput{
    width:100%;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

.todo-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #ddd;
}

.todo-left{
    display:flex;
    align-items:center;
    gap:8px;
    flex:1;
}

.todo-row.dragging {
    opacity: 0.4;
}

.todo-row.drag-over-top {
    border-top: 2px solid #4a90e2;
}

.todo-row.drag-over-bottom {
    border-bottom: 2px solid #4a90e2;
}

.drag-over-top {
    border-top: 2px solid #4a90e2;
}

.drag-over-bottom {
    border-bottom: 2px solid #4a90e2;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

button{
    padding:6px 10px;
}

.footer-buttons{
    margin-top:30px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.hidden{
    display:none;
}

.old-date{
    color:#888;
    font-size:0.9em;
}

.icon-btn{
    background:none;
    border:none;
    padding:0;
    margin-left:4px;
    cursor:pointer;
}

.icon-btn img{
    display:block;
    width:20px;
    height:20px;
}

.progress-btn{
    font-size:24px;
}

.flag0{
    color:#FFE4EC; 
    text-shadow: 0 0 2px rgba(0,0,0,0.2);
}

.flag1{
    color:#1f9d55; /* 緑：はっきり */
}

.flag2{
    color:#e67e22; /* オレンジ：濃いめ */
}

.card{
    margin-top:20px;
    padding:15px;
    border-radius:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.todo-card{
    background:#FFE4EC;   /* ふんわりピンク */
}

.daily-card{
     background:#eaffe8;    /* ラベンダー */
}
body{
    font-family:sans-serif;
    margin:10px;
    max-width:800px;
    margin:auto;
    background:#FAFAFC;
}
#inputArea{
    background:#fffeea;
    padding:15px;
    border-radius:16px;
    margin-top:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.inline-date {
    border: none;
    background: transparent;
    font-size: 14px;
    width: 120px;
    text-align: right;
}
.schedule-card{
    background:#EAF6FF;
    border-radius:16px;
    padding:15px;
    margin-top:10px;
}
#showAllDailyArea{
    display:block;
    text-align:right;
    margin-bottom:12px;
}
<!--画面作成（静的） -->

</style>
</head>

<body>

    <div class="header">

        <input type="date" id="targetDate">

</div>

<!--予定一覧画面 -------------------------------->
<div id="schedulePage" class="hidden">

    <h2>予定一覧</h2>

    <button id="backBtn">戻る</button>

    <div id="scheduleList" class="schedule-card"></div>
</div>
<!--タスク編集画面 -------------------------------->
<div id="editPage" class="hidden">

    <h2>タスク編集</h2>

    <div>
        <div>タスク名</div>
        <input type="text" id="editTodo">
    </div>

    <br>

    <div>
        <div>予定日</div>
        <input type="date" id="editScheduleDate">
    </div>

    <br>

    <div>
        <div>期日</div>
        <input type="date" id="editDueDate">
    </div>

    <br>

    <button id="editOkBtn">OK</button>
    <button id="editCancelBtn">キャンセル</button>

</div>

<div id="dailyEditPage" class="hidden">
    <h2>毎日タスク編集</h2>

    <div>
        <div>タスク名</div>
        <input type="text" id="dailyEditTodo">
    </div>

    <div>
        <div>開始時間</div>
        <input type="time" id="dailyEditTime">
    </div>

    <div>
        <div>曜日</div>

        
        <label><input type="checkbox" class="weekChk" value="0">日</label>
        <label><input type="checkbox" class="weekChk" value="1">月</label>
        <label><input type="checkbox" class="weekChk" value="2">火</label>
        <label><input type="checkbox" class="weekChk" value="3">水</label>
        <label><input type="checkbox" class="weekChk" value="4">木</label>
        <label><input type="checkbox" class="weekChk" value="5">金</label>
        <label><input type="checkbox" class="weekChk" value="6">土</label>
</div>

<button id="dailyEditOkBtn">OK</button>
<button id="dailyEditCancelBtn">キャンセル</button>
    



</div>

</body>


<script>
//ここからソース
const STORAGE_KEY = "todo_app_data_v1";
let editingItem = null;
let editFrom = "main";
let dailyEditingItem = null;
let editMode = "";

////関数
//今日の日付を返す関数=========================================
function todayStr(){
    const now = new Date();

    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");

    return `${y}-${m}-${d}`;
}


//指定した日付から今日までの経過日数を計算する====================
function elapsedDays(dateStr) {

    const today = new Date(todayStr());
    const target = new Date(dateStr);

    const diffMs = today - target;

    return Math.floor(
        diffMs / (1000 * 60 * 60 * 24)
    );
}
//予定日の表示方法の変更====================
function formatSchedule(dateStr){

    const d = new Date(dateStr);

    const week = ["日","月","火","水","木","金","土"];

    const w = week[d.getDay()];
    const m = d.getMonth() + 1;
    const day = d.getDate();

    return `${m}/${day}(${w})`;
}
//ローカルストレージからToDoデータを読み込む==========================
function loadData(){
    const data = localStorage.getItem(STORAGE_KEY);

    if(data){
        return JSON.parse(data);
    }

    return {
        singleTodos:[],
        dailyTodos:[]
    };
}

function showToast(text) {
    const el = document.createElement("div");
    el.textContent = text;

    el.style.position = "fixed";
    el.style.bottom = "20px";
    el.style.left = "50%";
    el.style.transform = "translateX(-50%)";
    el.style.background = "rgba(0,0,0,0.75)";
    el.style.color = "white";
    el.style.padding = "8px 12px";
    el.style.borderRadius = "6px";
    el.style.fontSize = "14px";
    el.style.zIndex = 9999;

    document.body.appendChild(el);

    setTimeout(() => el.remove(), 1200);
}


//現在のToDoデータ（db）をローカルストレージに保存する==================
function saveData(){
    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(db)
    );
}

//予定一覧の画面描写
function renderSchedulePage(){

    const scheduleList =
        document.getElementById("scheduleList");

    scheduleList.innerHTML = "";


    //日付で並び替え    
    const list =
    db.singleTodos
    .filter(x =>
        x.scheduleDate &&
        x.scheduleDate > todayStr()
    )
    .sort((a,b)=>
        a.scheduleDate.localeCompare(
            b.scheduleDate
        )
    );

    list.forEach(item=>{

        const row =
            document.createElement("div");
        row.className = "todo-row";

        const span =
        document.createElement("span");

        span.textContent =
            `${formatSchedule(item.scheduleDate)} ${item.todo}`;

        row.appendChild(span);

        // 予定日ボタン
        const editBtn =
            document.createElement("button");

        editBtn.className = "icon-btn";
        const editImg =
            document.createElement("img");

            editImg.src = "edit.svg";
            editImg.alt = "編集";
            editImg.width = 20;
            editImg.height = 20;

            editBtn.appendChild(editImg);

        editBtn.onclick = () => {

            editFrom = "schedule";
            editingItem = item;

            document
                .getElementById("schedulePage")
                .classList.add("hidden");

            document
                .getElementById("editPage")
                .classList.remove("hidden");

            document
                .getElementById("editTodo")
                .value = item.todo;

            document
                .getElementById("editScheduleDate")
                .value = item.scheduleDate || "";

            document
                .getElementById("editDueDate")
                .value = item.dueDate || "";
        };

        row.appendChild(editBtn);



        scheduleList.appendChild(row);
        
    });
}

function deleteSingle(id){
   
   if(!confirm(`${db.singleTodos.find(x=>x.id===id)?.todo} を削除しますか？`))
   {
        return;
    }

    db.singleTodos =
        db.singleTodos.filter(x=>x.id!==id);

    saveData();
    render();
}

function deleteDaily(id){
    if(!confirm(`${db.dailyTodos.find(x=>x.id===id)?.todo} を削除しますか？`))
   {
        return;
    }
    db.dailyTodos =
        db.dailyTodos.filter(x=>x.id!==id);

    saveData();
    render();
}


function reorder(fromId, toId){

    const list = db.singleTodos;

    const fromIndex =
        list.findIndex(x => x.id === fromId);

    const toIndex =
        list.findIndex(x => x.id === toId);

    if(fromIndex === -1 || toIndex === -1){
        return;
    }

    const [moved] =
        list.splice(fromIndex, 1);

    list.splice(toIndex, 0, moved);

    // ★順番を保存（重要）
    list.forEach((item, i) => {
        item.order = i;
    });

    saveData();
    render();
}

//メイン画面描写
function render(){
    const singleTitle =
    document.getElementById("singleTitle");
    const inputArea =
    document.getElementById("inputArea");
    const viewDate = targetDate.value;
  


    const isToday = viewDate === todayStr();

    const singleList =
        document.getElementById("singleList");

    const dailyList =
        document.getElementById("dailyList");

    singleList.innerHTML="";
    dailyList.innerHTML="";


    // 単発ToDo
    //// 並び変える
        let list = [...db.singleTodos];
        list.sort((a, b) => a.order - b.order);
    
    let singleDisplay;
    //日付による区分
    if(isToday){
        singleTitle.textContent = "ToDo";
        singleDisplay =
            db.singleTodos.filter(x=>
                (
                    x.completeDate==="" ||
                    x.completeDate===todayStr()
                )
                &&
                (
                    !x.scheduleDate ||
                    x.scheduleDate <= todayStr()
                )
            );

    }else{
        singleTitle.textContent = "完了履歴";
        singleDisplay =
            db.singleTodos.filter(x=>
                x.completeDate===viewDate
            );

    }
    //// データの中身を描写する
    singleDisplay.forEach(item=>{

        const row =
            document.createElement("div");

        row.className="todo-row";
        //ドラッグ可能にする
        row.draggable = true;

        row.addEventListener("dragstart", (e) => {

            e.dataTransfer.setData(
                "text/plain",
                item.id
            );
            row.classList.add("dragging");
        });

        row.addEventListener("dragend", () => {
            row.classList.remove("dragging");
        });

        row.addEventListener("dragover", (e) => {
            e.preventDefault();

            const rect = row.getBoundingClientRect();
            const offsetY = e.clientY - rect.top;

            const isTop = offsetY < rect.height / 2;

            row.classList.remove("drag-over-top", "drag-over-bottom");

            if (isTop) {
                row.classList.add("drag-over-top");
            } else {
                row.classList.add("drag-over-bottom");
            }
        });

        row.addEventListener("dragleave", () => {
            row.classList.remove("drag-over-top", "drag-over-bottom");
        });

        row.addEventListener("drop", (e) => {

            e.preventDefault();

            row.classList.remove("drag-over-top", "drag-over-bottom");

            const fromId =
                e.dataTransfer.getData("text/plain");

            const toId = item.id;

            reorder(fromId, toId);
        });

        const left =
            document.createElement("div");

        left.className="todo-left";

        const chk =
            document.createElement("input");

        chk.type="checkbox";

        const completed =
            item.completeDate===viewDate ||
            (isToday && item.completeDate===todayStr());

        chk.checked = completed;

        if(!isToday){
            chk.disabled=true;
        }

        chk.addEventListener("change",()=>{

            item.completeDate =
                chk.checked ? todayStr() : "";

            saveData();
            render();

        });

        const span =
            document.createElement("span");

        let text = item.todo;
//追加ここから
        const textSpan =
            document.createElement("span");

        textSpan.textContent = text;
        left.appendChild(chk);
        left.appendChild(textSpan);
        if(item.dueDate){

            const diff =
                Math.floor(
                    (new Date(item.dueDate) - new Date(todayStr()))
                    / (1000 * 60 * 60 * 24)
                );

            const dueSpan =
                document.createElement("span");

            if(diff > 0){

                dueSpan.textContent =
                    ` 〆残${diff}日`;

                dueSpan.style.color = "#2196F3";

            }else if(diff < 0){

                dueSpan.textContent =
                    ` 〆超${Math.abs(diff)}日`;

                dueSpan.style.color = "red";

            }else{

                dueSpan.textContent =
                    ` 〆今日`;

                dueSpan.style.color = "#ff9800";
            }

            dueSpan.style.fontWeight = "bold";

            left.appendChild(dueSpan);
        
        }else if(item.scheduleDate){

            const diff =
            Math.floor(
                (new Date(todayStr()) -
                new Date(item.scheduleDate))
                / (1000 * 60 * 60 * 24)
            );

            if(diff === 0){

                span.style.color = "#4a90e2";
                span.style.fontWeight = "bold";

            }else if(diff > 0){

                const planSpan =
                    document.createElement("span");

                planSpan.textContent =
                    ` (予定+${diff}日)`;

                planSpan.style.color = "red";

                left.appendChild(planSpan);
            }else if(
                isToday &&
                item.createDate &&
                item.createDate < todayStr()
            ){

            const days = elapsedDays(item.createDate);

            const ageSpan =
                document.createElement("span");

            ageSpan.textContent =
                ` (${days}日目)`;

            ageSpan.style.color = "#666";

            left.appendChild(ageSpan);
            }    
        }
        

        

        

        if(completed){
            textSpan.classList.add("completed");
        }

        row.appendChild(left);

        if(isToday){
            //対応中ボタン
            const progressBtn =
                document.createElement("button");
            progressBtn.className = "icon-btn progress-btn";
            progressBtn.textContent = "●";

           if(item.progressFlag === 0){
                progressBtn.classList.add("flag0");
            }
            if(item.progressFlag === 1){
                progressBtn.classList.add("flag1");
            }
            if(item.progressFlag === 2){
                progressBtn.classList.add("flag2");
            }
            progressBtn.onclick = ()=>{

                item.progressFlag =
                    (item.progressFlag + 1) % 3;

                saveData();
                render();
            };
            
            //編集ボタンを追加
            //編集ボタン
            const editBtn =
                document.createElement("button");

            editBtn.className = "icon-btn";

            const editImg =
                document.createElement("img");

            editImg.src = "edit.svg";
            editImg.alt = "編集";
            editImg.width = 20;
            editImg.height = 20;

            editBtn.appendChild(editImg);

            editBtn.onclick = () => {
                
                editFrom = "main";
                editingItem = item;

                document
                    .getElementById("mainPage")
                    .classList.add("hidden");

                document
                    .getElementById("editPage")
                    .classList.remove("hidden");

                document
                    .getElementById("editTodo")
                    .value = item.todo;

                document
                    .getElementById("editScheduleDate")
                    .value = item.scheduleDate || "";

                document
                    .getElementById("editDueDate")
                    .value = item.dueDate || "";
            };
            

            //削除ボタン
            const del =
                document.createElement("button");
                del.className = "icon-btn";

            const img =
                document.createElement("img");

            img.src = "trash.svg";
            img.alt = "削除";
            img.width = 20;
            img.height = 20;

            del.appendChild(img);



            del.onclick=
                ()=>deleteSingle(item.id);
            
            //ボタンを並べる
            row.appendChild(progressBtn);
            row.appendChild(editBtn);
            row.appendChild(del);

        }

        singleList.appendChild(row);

    });

    // 毎日ToDo

    const dailyArea =
        document.getElementById("dailyArea");

    if(!isToday){

        dailyArea.classList.add("hidden");
        inputArea.classList.add("hidden");
       
    }else{

        
        dailyArea.classList.remove("hidden");
        inputArea.classList.remove("hidden");

        const todayWeek = new Date().getDay();

        const dailyDisplay =
            [...db.dailyTodos]
            .filter(item =>
                !item.weekDays ||
                item.weekDays.length === 0 ||
                item.weekDays.includes(todayWeek)
            )
            .sort((a,b)=>{

                const ta = a.scheduleTime || "";
                const tb = b.scheduleTime || "";

                if(!ta && !tb) return 0;
                if(!ta) return 1;
                if(!tb) return -1;

                return ta.localeCompare(tb);
            });
  

        dailyDisplay.forEach(item=>{


            const row =
                document.createElement("div");

            row.className="todo-row";

            const left =
                document.createElement("div");

            left.className="todo-left";

            const chk =
                document.createElement("input");

            chk.type="checkbox";

            chk.checked =
                item.completeDate===todayStr();

            chk.addEventListener("change",()=>{

                item.completeDate =
                    chk.checked
                    ? todayStr()
                    : "";

                saveData();
                render();

            });

            const span =
                document.createElement("span");

            span.textContent =
                item.scheduleTime
                ? `${item.scheduleTime}　${item.todo}`
                : item.todo;

            if(item.completeDate===todayStr()){
                span.classList.add("completed");
            }

            left.appendChild(chk);
            left.appendChild(span);

            row.appendChild(left);

            //編集ボタン
            const editBtn =
                document.createElement("button");

            editBtn.className = "icon-btn";

            const editImg =
                document.createElement("img");

            editImg.src = "edit.svg";
            editImg.alt = "編集";
            editImg.width = 20;
            editImg.height = 20;

            editBtn.appendChild(editImg);

            editBtn.onclick = () => {

                editFrom = "main";
                dailyEditingItem = item;

                document
                    .getElementById("mainPage")
                    .classList.add("hidden");

                document
                    .getElementById("dailyEditPage")
                    .classList.remove("hidden");

                document
                    .getElementById("dailyEditTodo")
                    .value = item.todo;

                document
                    .getElementById("dailyEditTime")
                    .value = item.scheduleTime || "";
                document
                    .querySelectorAll(".weekChk")
                    .forEach(chk => {

                        chk.checked =
                            item.weekDays &&
                            item.weekDays.includes(
                                Number(chk.value)
                             );
                        });


            };
            
            row.appendChild(editBtn);

            //削除ボタン
            const del =
                document.createElement("button");
                del.className = "icon-btn";

           const img =
                document.createElement("img");

            img.src = "trash.svg";
            img.alt = "削除";
            img.width = 20;
            img.height = 20;

            del.appendChild(img);

            del.onclick=
                ()=>deleteDaily(item.id);

            row.appendChild(del);

            dailyList.appendChild(row);

        });
    }

// 今日ボタン活性制御
       const todayBtn =
       document.getElementById("todayBtn");

        todayBtn.disabled =
        targetDate.value === todayStr();
    
    const nextDayBtn =
    document.getElementById("nextDayBtn");

    nextDayBtn.disabled =
    targetDate.value === todayStr();
}





//データと画面をつなぐ初期設定ブロック==============
let db = loadData();

const targetDate =
    document.getElementById("targetDate");

const dailyFlg =
    document.getElementById("dailyFlg");


targetDate.value = todayStr();
targetDate.max = todayStr();


//HTMLページ全体（DOM）を操作するブロック==============
document.getElementById("prevDayBtn").addEventListener("click",()=>{
    const d = new Date(targetDate.value);
    d.setDate(d.getDate()-1);

    targetDate.value = d.toISOString().slice(0,10);

    render();
});

document.getElementById("nextDayBtn")
.addEventListener("click",()=>{

    const d = new Date(targetDate.value);

    d.setDate(d.getDate()+1);

    const nextDate =
        d.toISOString().slice(0,10);

    if(nextDate > todayStr()){
        return;
    }

    targetDate.value = nextDate;

    render();
});



targetDate.addEventListener("change",()=>{

    if(targetDate.value > todayStr()){
        targetDate.value = todayStr();
    }

    render();
});
//追加中メモ
document.getElementById("scheduleBtn")
.addEventListener("click",()=>{

    renderSchedulePage();

    document
        .getElementById("mainPage")
        .classList.add("hidden");

    document
        .getElementById("schedulePage")
        .classList.remove("hidden");

});

document.getElementById("backBtn")
.addEventListener("click",()=>{

    document
        .getElementById("mainPage")
        .classList.remove("hidden");

    document
        .getElementById("schedulePage")
        .classList.add("hidden");

});
//追加ここまで
document
    .getElementById("todayBtn")
    .addEventListener("click", () => {

        targetDate.value = todayStr();

        render();
    });

document.getElementById("todoInput")
.addEventListener("keypress",(e)=>{

    if(e.key !== "Enter"){
        return;
    }

    const text = e.target.value.trim();

    if(!text){
        return;
    }

    const isDaily =
        document.getElementById("dailyFlg").checked;

    if(isDaily){

        db.dailyTodos.push({
            id:crypto.randomUUID(),
            todo:text,
            completeDate:"",
            scheduleTime:"",
            weekDays:[]
        });

    }else{

        db.singleTodos.push({
            id:crypto.randomUUID(),
            createDate:todayStr(),
            todo:text,
            completeDate:"",
            scheduleDate:"",
            dueDate: "",
            progressFlag:0,
            order: db.singleTodos.length
        });

    }

    saveData();

    e.target.value="";

    render();
});

document.getElementById("clearOldBtn")
.addEventListener("click",()=>{

    if(
        !confirm("1か月以上前に完了した単発ToDoを削除しますか？")
    ){
        return;
    }

    const limit = new Date();
    limit.setMonth(limit.getMonth()-1);

    db.singleTodos =
        db.singleTodos.filter(item=>{

            if(!item.completeDate){
                return true;
            }

            return new Date(item.completeDate) >= limit;
        });

    saveData();
    render();
});

document.getElementById("clearAllBtn")
.addEventListener("click",()=>{

    if(
        !confirm("全データを削除しますか？")
    ){
        return;
    }

    db = {
        singleTodos:[],
        dailyTodos:[]
    };

    saveData();
    render();
});

//編集画面OKボタン

        .value
        .trim();

        if(!todo){
            alert("タスク名を入力してください");
            return;
        }
    //新規作成
    if(editMode === "newSingle"){

        db.singleTodos.push({
            id: crypto.randomUUID(),
            createDate: todayStr(),

            scheduleDate:
                document.getElementById("editScheduleDate").value,

                document.getElementById("editDueDate").value,

            order: db.singleTodos.length
        });

        saveData();

        document
            .getElementById("editPage")
            .classList.add("hidden");

        document
            .getElementById("mainPage")
            .classList.remove("hidden");

    //更新処理

        .getElementById("editPage")

    if(editFrom === "schedule"){

            .getElementById("schedulePage")

            .getElementById("mainPage")

});

//毎日OKボタン
document
.getElementById("dailyEditOkBtn")
.addEventListener("click",()=>{

    const weekDays =
        [...document.querySelectorAll(".weekChk")]
        .filter(chk=>chk.checked)
        .map(chk=>Number(chk.value));
    
    const todo =
        document.getElementById("dailyEditTodo")
        .value
        .trim();

    if(!todo){
        alert("タスク名を入力してください");
        return;
    }

    // 新規追加
    if(editMode === "newDaily"){

        db.dailyTodos.push({
            id: crypto.randomUUID(),
            todo: todo,
            completeDate:"",
            scheduleTime:
                document.getElementById("dailyEditTime").value,
            weekDays
        });

        editMode = "";
   
    }

    // 既存編集

    if(dailyEditingItem){

        dailyEditingItem.todo = todo;

        dailyEditingItem.scheduleTime =
            document.getElementById("dailyEditTime").value;

        dailyEditingItem.weekDays =
            weekDays;

    }

    saveData();

    document
        .getElementById("dailyEditPage")
        .classList.add("hidden");

    document
        .getElementById("mainPage")
        .classList.remove("hidden");

    render();

});

//毎日編集画面キャンセルボタン
document.getElementById("dailyEditCancelBtn")
.addEventListener("click",()=>{

    dailyEditingItem = null;
    editMode = "";

    document
        .getElementById("dailyEditPage")
        .classList.add("hidden");

    document
        .getElementById("mainPage")
        .classList.remove("hidden");

});

//単発タスク追加ボタン
document.getElementById("addSingleBtn")
.addEventListener("click",()=>{

    editMode = "newSingle";
    editingItem = null;

    document
        .getElementById("editTodo")
        .value = "";

    document
        .getElementById("editScheduleDate")
        .value = "";

    document
        .getElementById("editDueDate")
        .value = "";

    document
        .getElementById("mainPage")
        .classList.add("hidden");

    document
        .getElementById("editPage")
        .classList.remove("hidden");

});
//毎日タスク追加ボタン
document.getElementById("addDailyBtn")
.addEventListener("click",()=>{

    editMode = "newDaily";
    dailyEditingItem = null;

    document
        .getElementById("dailyEditTodo")
        .value = "";

    document
        .getElementById("dailyEditTime")
        .value = "";

    document
        .querySelectorAll(".weekChk")
        .forEach(chk=>chk.checked=false);

    document
        .getElementById("mainPage")
        .classList.add("hidden");

    document
        .getElementById("dailyEditPage")
        .classList.remove("hidden");

});
