<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDo管理＿Ver.1.0</title>

<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<style>
body{
    font-family:sans-serif;
    margin:10px;
    max-width:800px;
    margin:auto;
}

h2{
    margin-top:25px;
}

.header{
    display:flex;
    align-items:center;
    gap:10px;
    flex-wrap:wrap;
}

input[type="date"]{
    font-size:16px;
}

#todoInput{
    width:100%;
    padding:10px;
    font-size:16px;
    box-sizing:border-box;
}

.todo-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #ddd;
}

.todo-left{
    display:flex;
    align-items:center;
    gap:8px;
    flex:1;
}

.completed{
    text-decoration:line-through;
    color:gray;
}

button{
    padding:6px 10px;
}

.footer-buttons{
    margin-top:30px;
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

.hidden{
    display:none;
}

.old-date{
    color:#888;
    font-size:0.9em;
}


.card{
    margin-top:20px;
    padding:15px;
    border-radius:16px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.todo-card{
    background:#FFE4EC;   /* ふんわりピンク */
}

.daily-card{
     background:#eaffe8;    /* ラベンダー */
}
body{
    font-family:sans-serif;
    margin:10px;
    max-width:800px;
    margin:auto;
    background:#FAFAFC;
}
#inputArea{
    background:#fffeea;
    padding:15px;
    border-radius:16px;
    margin-top:15px;
    margin-bottom:20px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}



</style>
</head>

<body>

<div class="header">
    <button id="prevDayBtn">◀</button>

    <input type="date" id="targetDate">

    <button id="nextDayBtn">▶</button>

    <button id="todayBtn">今日</button>

</div>

<br>

<div id="inputArea">
    <label>
        <input type="checkbox" id="dailyFlg">
        毎日
    </label>
    
    <label>
        <input type="checkbox" id="scheduleFlg">
        予定
    </label>

    <input
        type="date"
        id="dueDateInput"
        disabled
    >
    <br><br>

    <input
        type="text"
        id="todoInput"
        placeholder="ToDo入力（Enterで追加）"
    >
</div>

<div id="singleArea" class="card todo-card">
    <h2 id="singleTitle">ToDo</h2>
    <div id="singleList"></div>

</div>

<div id="dailyArea"  class="card daily-card">
    <h2>毎日のタスク</h2>
    <div id="dailyList"></div>
</div>

<div class="footer-buttons">
    <button id="clearOldBtn">データクリア</button>
    <button id="clearAllBtn">全データクリア</button>
</div>

<script>

const STORAGE_KEY = "todo_app_data_v1";

function todayStr(){
    const now = new Date();

    const y = now.getFullYear();
    const m = String(now.getMonth() + 1).padStart(2, "0");
    const d = String(now.getDate()).padStart(2, "0");

    return `${y}-${m}-${d}`;
}

function loadData(){
    const data = localStorage.getItem(STORAGE_KEY);

    if(data){
        return JSON.parse(data);
    }

    return {
        singleTodos:[],
        dailyTodos:[]
    };
}

function saveData(){
    localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify(db)
    );
}

let db = loadData();

const targetDate =
    document.getElementById("targetDate");

const dailyFlg =
    document.getElementById("dailyFlg");

const scheduleFlg =
    document.getElementById("scheduleFlg");

const dueDateInput =
    document.getElementById("dueDateInput");

targetDate.value = todayStr();
targetDate.max = todayStr();

dueDateInput.min = todayStr();

document.getElementById("prevDayBtn").addEventListener("click",()=>{
    const d = new Date(targetDate.value);
    d.setDate(d.getDate()-1);

    targetDate.value = d.toISOString().slice(0,10);

    render();
});

document.getElementById("nextDayBtn")
.addEventListener("click",()=>{

    const d = new Date(targetDate.value);

    d.setDate(d.getDate()+1);

    const nextDate =
        d.toISOString().slice(0,10);

    if(nextDate > todayStr()){
        return;
    }

    targetDate.value = nextDate;

    render();
});

targetDate.addEventListener("change",()=>{

    if(targetDate.value > todayStr()){
        targetDate.value = todayStr();
    }

    render();
});

document
    .getElementById("todayBtn")
    .addEventListener("click", () => {

        targetDate.value = todayStr();

        render();
    });

document.getElementById("todoInput")
.addEventListener("keypress",(e)=>{

    if(e.key !== "Enter"){
        return;
    }

    const text = e.target.value.trim();

    if(!text){
        return;
    }

    const isDaily =
        document.getElementById("dailyFlg").checked;

    if(isDaily){

        db.dailyTodos.push({
            id:crypto.randomUUID(),
            todo:text,
            completeDate:""
        });

    }else{

        db.singleTodos.push({
            id:crypto.randomUUID(),
            createDate:todayStr(),
            todo:text,
            completeDate:""
        });

    }

    saveData();

    e.target.value="";

    render();
});

function deleteSingle(id){

    db.singleTodos =
        db.singleTodos.filter(x=>x.id!==id);

    saveData();
    render();
}

function deleteDaily(id){

    db.dailyTodos =
        db.dailyTodos.filter(x=>x.id!==id);

    saveData();
    render();
}

function render(){
    const singleTitle =
    document.getElementById("singleTitle");
    const inputArea =
    document.getElementById("inputArea");
    const viewDate = targetDate.value;
    const isToday = viewDate === todayStr();

    const singleList =
        document.getElementById("singleList");

    const dailyList =
        document.getElementById("dailyList");

    singleList.innerHTML="";
    dailyList.innerHTML="";

    // 単発ToDo

    let singleDisplay;

    if(isToday){
        singleTitle.textContent = "ToDo";
        singleDisplay =
            db.singleTodos.filter(x=>
                x.completeDate==="" ||
                x.completeDate===todayStr()
            );

    }else{
        singleTitle.textContent = "完了履歴";
        singleDisplay =
            db.singleTodos.filter(x=>
                x.completeDate===viewDate
            );

    }

    singleDisplay.forEach(item=>{

        const row =
            document.createElement("div");

        row.className="todo-row";

        const left =
            document.createElement("div");

        left.className="todo-left";

        const chk =
            document.createElement("input");

        chk.type="checkbox";

        const completed =
            item.completeDate===viewDate ||
            (isToday && item.completeDate===todayStr());

        chk.checked = completed;

        if(!isToday){
            chk.disabled=true;
        }

        chk.addEventListener("change",()=>{

            item.completeDate =
                chk.checked ? todayStr() : "";

            saveData();
            render();

        });

        const span =
            document.createElement("span");

        let text = item.todo;

        if(
            item.createDate &&
            item.createDate < todayStr()
        ){
            const d = new Date(item.createDate);

            text +=
                ` (${d.getMonth()+1}/${d.getDate()})`;
        }

        span.textContent=text;

        if(completed){
            span.classList.add("completed");
        }

        left.appendChild(chk);
        left.appendChild(span);

        row.appendChild(left);

        if(isToday){

            const del =
                document.createElement("button");

            del.textContent="削除";

            del.onclick=
                ()=>deleteSingle(item.id);

            row.appendChild(del);

        }

        singleList.appendChild(row);

    });

    // 毎日ToDo

    const dailyArea =
        document.getElementById("dailyArea");

    if(!isToday){

        dailyArea.classList.add("hidden");
        inputArea.classList.add("hidden");
       
    }else{

        
        dailyArea.classList.remove("hidden");
        inputArea.classList.remove("hidden");

        db.dailyTodos.forEach(item=>{

            const row =
                document.createElement("div");

            row.className="todo-row";

            const left =
                document.createElement("div");

            left.className="todo-left";

            const chk =
                document.createElement("input");

            chk.type="checkbox";

            chk.checked =
                item.completeDate===todayStr();

            chk.addEventListener("change",()=>{

                item.completeDate =
                    chk.checked
                    ? todayStr()
                    : "";

                saveData();
                render();

            });

            const span =
                document.createElement("span");

            span.textContent=item.todo;

            if(item.completeDate===todayStr()){
                span.classList.add("completed");
            }

            left.appendChild(chk);
            left.appendChild(span);

            row.appendChild(left);

            const del =
                document.createElement("button");

            del.textContent="削除";

            del.onclick=
                ()=>deleteDaily(item.id);

            row.appendChild(del);

            dailyList.appendChild(row);

        });
    }

// 今日ボタン活性制御
       const todayBtn =
       document.getElementById("todayBtn");

        todayBtn.disabled =
        targetDate.value === todayStr();
    
    const nextDayBtn =
    document.getElementById("nextDayBtn");

    nextDayBtn.disabled =
    targetDate.value === todayStr();
}



document.getElementById("clearOldBtn")
.addEventListener("click",()=>{

    if(
        !confirm("1か月以上前に完了した単発ToDoを削除しますか？")
    ){
        return;
    }

    const limit = new Date();
    limit.setMonth(limit.getMonth()-1);

    db.singleTodos =
        db.singleTodos.filter(item=>{

            if(!item.completeDate){
                return true;
            }

            return new Date(item.completeDate) >= limit;
        });

    saveData();
    render();
});

document.getElementById("clearAllBtn")
.addEventListener("click",()=>{

    if(
        !confirm("全データを削除しますか？")
    ){
        return;
    }

    db = {
        singleTodos:[],
        dailyTodos:[]
    };

    saveData();
    render();
});
window.addEventListener("pageshow", () => {

    targetDate.value = todayStr();
    targetDate.max = todayStr();

    render();

});
render();

</script>
<div id="version">v1.00</div>
</body>
</html>
