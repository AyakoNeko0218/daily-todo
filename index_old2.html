<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily OS</title>

<style>
body {
    font-family: sans-serif;
    max-width: 720px;
    margin: 20px auto;
    padding: 0 12px;
}

.row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

input[type=text], input[type=date] {
    padding: 8px;
    flex: 1;
}

button {
    padding: 8px 12px;
}

.task {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px;
    border: 1px solid #ddd;
    border-radius: 8px;
    margin-bottom: 6px;
    background: #fff;
}

.task.done span {
    text-decoration: line-through;
    opacity: 0.5;
}

section {
    margin-bottom: 24px;
}
</style>
</head>

<body>

<h1>Daily OS</h1>

<div class="row">
    <label>
        <input type="checkbox" id="hideDone" onchange="render()">
        未完了のみ表示
    </label>
</div>

<!-- 日付 -->
<div class="row">
    <button id="prev">←</button>
    <input type="date" id="date">
    <button id="next">→</button>
</div>

<!-- 入力 -->
<div class="row">
    <label>
        <input type="checkbox" id="isDaily">
        毎日
    </label>

    <input type="text" id="taskInput" placeholder="タスク入力">

    <button onclick="addTask()">追加</button>
</div>

<!-- 今日 -->
<section>
<h2>【今日】</h2>
<div id="todayList"></div>
</section>

<!-- 毎日 -->
<section>
<h2>【毎日】</h2>
<div id="dailyList"></div>
</section>

<script>
const KEY = "daily_os_final_A";
const DAILY_KEY = "daily_master_final_A";

let data = JSON.parse(localStorage.getItem(KEY) || "{}");
let dailyMaster = JSON.parse(localStorage.getItem(DAILY_KEY) || "[]");

const dateEl = document.getElementById("date");

function todayStr(){
    const d = new Date();
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${yyyy}-${mm}-${dd}`;
}

function prevDate(d){
    const x = new Date(d);
    x.setDate(x.getDate() - 1);
    return x.toISOString().slice(0,10);
}

function nextDate(d){
    const x = new Date(d);
    x.setDate(x.getDate() + 1);
    return x.toISOString().slice(0,10);
}

// 初期化
document.addEventListener("DOMContentLoaded", () => {
    dateEl.value = todayStr();
    ensureDay(dateEl.value);
    render();
});

// 日生成（未完了のみ繰越）
function ensureDay(date){

    if(data[date]) return;

    let carry = [];

    // 未完了タスクを全日から回収
    Object.keys(data).forEach(d => {
        (data[d] || []).forEach(t => {
            if(t.type === "single" && !t.done){
                if(!carry.find(x => x.id === t.id)){
                    carry.push({
                        id: t.id || crypto.randomUUID(),
                        title: t.title,
                        type: "single",
                        done: t.done || false
                    });
                }
            }
        });
    });

    data[date] = carry;

    save();
}

// 保存
function save(){
    localStorage.setItem(KEY, JSON.stringify(data));
    localStorage.setItem(DAILY_KEY, JSON.stringify(dailyMaster));
}

// 描画
function render(){

    const date = dateEl.value;
    ensureDay(date);

    const list = data[date] || [];
    const hideDone = document.getElementById("hideDone").checked;

    const todayList = document.getElementById("todayList");
    const dailyList = document.getElementById("dailyList");

    todayList.innerHTML = "";
    dailyList.innerHTML = "";

    // ======================
    // 今日タスク
    // ======================
    list.forEach(t => {

        if(hideDone && t.done) return;

        const div = document.createElement("div");
        div.className = "task" + (t.done ? " done" : "");

        div.innerHTML = `
            <input type="checkbox" ${t.done ? "checked" : ""}>
            <span>${t.title}</span>
            <button>削除</button>
        `;

        // チェック
        div.querySelector("input").onchange = () => {
            const target = data[date].find(x => x.id === t.id);
            if(target){
                target.done = !target.done;
            }
            save();
            render();
        };

        // 削除
        div.querySelector("button").onclick = () => {
            data[date] = data[date].filter(x => x.id !== t.id);
            save();
            render();
        };

        todayList.appendChild(div);
    });

    // ======================
    // 毎日タスク
    // ======================
    dailyMaster.forEach(t => {

        const div = document.createElement("div");
        div.className = "task";

        div.innerHTML = `
            <span>${t.title}</span>
            <button>削除</button>
        `;

        div.querySelector("button").onclick = () => {
            dailyMaster = dailyMaster.filter(x => x.id !== t.id);
            save();
            render();
        };

        dailyList.appendChild(div);
    });
}

// 追加
function addTask(){

    const title = document.getElementById("taskInput").value.trim();
    const isDaily = document.getElementById("isDaily").checked;

    if(!title) return;

    const date = dateEl.value;

    ensureDay(date);

    if(isDaily){
        dailyMaster.push({
            id: crypto.randomUUID(),
            title
        });
    } else {
        data[date].push({
            id: crypto.randomUUID(),
            title,
            type: "single",
            done: false
        });
    }

    document.getElementById("taskInput").value = "";
    document.getElementById("isDaily").checked = false;

    save();
    render();
}

// 日付移動
document.getElementById("prev").onclick = () => {
    dateEl.value = prevDate(dateEl.value);
    render();
};

document.getElementById("next").onclick = () => {
    dateEl.value = nextDate(dateEl.value);
    render();
};

dateEl.onchange = render;

// Enter追加
document.getElementById("taskInput").addEventListener("keydown", e => {
    if(e.key === "Enter") addTask();
});
</script>

</body>
</html>
